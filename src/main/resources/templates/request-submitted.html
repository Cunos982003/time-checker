<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: Arial, sans-serif; color: #333; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 32px auto; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .header { background-color: #2196F3; padding: 24px 32px; color: white; }
    .header h1 { margin: 0; font-size: 22px; }
    .body { padding: 32px; }
    .body p { line-height: 1.7; }
    .badge { display: inline-block; background-color: #FF9800; color: white; padding: 4px 12px; border-radius: 4px; font-weight: bold; }
    .footer { background-color: #f5f5f5; padding: 16px 32px; font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>New Request Submitted</h1>
  </div>
  <div class="body">
    <p>Dear <strong th:text="${recipientName}">Manager</strong>,</p>
    <p>A new <strong th:text="${requestType}">request</strong> has been submitted and is <span class="badge">PENDING APPROVAL</span>.</p>
    <table style="width:100%; border-collapse:collapse; margin: 16px 0;">
      <tr th:each="entry : ${details}">
        <td style="padding:8px; border-bottom:1px solid #eee; color:#666; width:40%;" th:text="${entry.key}">Key</td>
        <td style="padding:8px; border-bottom:1px solid #eee; font-weight:bold;" th:text="${entry.value}">Value</td>
      </tr>
    </table>
    <p>Please log in to the Timekeeping System to review and action this request.</p>
  </div>
  <div class="footer">This is an automated message from the Timekeeping System. Please do not reply.</div>
</div>
</body>
</html>
